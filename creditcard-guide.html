// ── CONTENT RENDERERS ────────────────────────────────────────────────────────

function renderInterest(){return `
  <div class="section-lbl">The core idea</div>
  <div class="box blue"><div class="box-lbl">How it works</div>
    Interest is calculated <strong>every single day</strong> on your outstanding balance, but it only <em>appears</em> on your statement at the end of each month. Miss a full payment - and you pay for every day the balance sat there.
  </div>

  <div class="box red">
    <div class="box-lbl">Why interest can appear on two statements</div>

    Interest on purchases can start building in the background -  
    but it is <strong>only charged if the full closing balance is not paid by the due date</strong>.

    <br><br>

    <strong>What happens:</strong>
      <ul style="padding-left:12px">
        <li>First statement → no interest shown yet</li>
        <li>Customer does not pay full balance → interest-free period is lost</li>
        <li>Next statement → main interest charge is added</li>
        <li>If they then pay in full → a small additional interest charge may appear on the following statement</li>
      </ul>
      <br>

      <strong>Why it happens:</strong><br>
      Interest keeps building daily until the balance is fully paid,  
      but it is only added to the account at statement time.

      <br><br>

      This delay can make it look like interest is being charged twice -  
      but it’s actually <strong>one continuous interest period shown across two statements</strong>.
  </div>

  <div class="section-lbl">Daily interest formula</div>
  <div style="background:var(--navy);border-radius:var(--rl);padding:1rem 1.25rem;text-align:center;margin-bottom:12px">
    <div style="font-size:11px;color:rgba(255,255,255,.5);margin-bottom:6px;letter-spacing:.08em;text-transform:uppercase">Daily interest charge</div>
    <div style="font-size:16px;font-weight:700;color:#fff;letter-spacing:-.01em">Balance × (Annual Rate ÷ 365)</div>
    <div style="font-size:12px;color:rgba(255,255,255,.55);margin-top:8px">Calculated daily on the <strong>outstanding balance each day </strong>(not a fixed amount)</div>
  </div>

  <div class="section-lbl">What actually happens step by step</div>
  <!-- Timeline -->
  <div style="position:relative;margin:1rem 0 2rem;padding:0 8px">
    <div style="height:6px;background:linear-gradient(90deg,var(--green) 0%,var(--amber) 60%,var(--red) 100%);border-radius:99px;position:relative">
      <!-- nodes -->
      <div style="position:absolute;left:0;top:50%;transform:translateY(-50%)">
        <div style="width:16px;height:16px;background:var(--green);border:3px solid #fff;border-radius:99px;box-shadow:0 0 0 1px var(--green)"></div>
      </div>
      <div style="position:absolute;left:40%;top:50%;transform:translateX(-50%) translateY(-50%)">
        <div style="width:16px;height:16px;background:var(--amber);border:3px solid #fff;border-radius:99px;box-shadow:0 0 0 1px var(--amber)"></div>
      </div>
      <div style="position:absolute;left:70%;top:50%;transform:translateX(-50%) translateY(-50%)">
        <div style="width:16px;height:16px;background:var(--red);border:3px solid #fff;border-radius:99px;box-shadow:0 0 0 1px var(--red)"></div>
      </div>
      <div style="position:absolute;right:0;top:50%;transform:translateY(-50%)">
        <div style="width:16px;height:16px;background:#666;border:3px solid #fff;border-radius:99px;box-shadow:0 0 0 1px #ccc"></div>
      </div>
    </div>
    <!-- labels below -->
    <div style="display:flex;justify-content:space-between;margin-top:14px;font-size:10px">
      <div style="text-align:center;width:60px">
        <div style="font-weight:600;color:var(--green)">1 Mar</div>
        <div style="color:var(--t3)">Purchase<br>$1,000</div>
      </div>
      <div style="text-align:center;width:80px;margin-left:-10px">
        <div style="font-weight:600;color:var(--amber)">31 Mar</div>
        <div style="color:var(--t3)">Statement<br>issued</div>
      </div>
      <div style="text-align:center;width:80px">
        <div style="font-weight:600;color:var(--red)">25 Apr</div>
        <div style="color:var(--t3)">Due date<br>missed</div>
      </div>
      <div style="text-align:center;width:60px">
        <div style="font-weight:600;color:#666">30 Apr</div>
        <div style="color:var(--t3)">Next<br>statement</div>
      </div>
    </div>
    <!-- annotation above line -->
    
  </div>

  <div class="section-lbl">The 2-statement problem (most common customer confusion)</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
    <div class="stmt" style="margin:0">
      <div class="stmt-head" style="padding:.5rem .75rem"><span class="stmt-head-title">March Statement</span></div>
      <div class="stmt-row"><span class="stmt-label">Balance</span><span class="stmt-amount">$1,000</span></div>
      <div class="stmt-row highlight-green"><span class="stmt-label">Payment received</span><span class="stmt-amount neg">-$1,000</span></div>
      <div class="stmt-row subtotal"><span class="stmt-label">Closing balance</span><span class="stmt-amount">$0</span></div>
    </div>
    <div class="stmt" style="margin:0">
      <div class="stmt-head" style="padding:.5rem .75rem"><span class="stmt-head-title">April Statement</span></div>
      <div class="stmt-row"><span class="stmt-label">Opening balance</span><span class="stmt-amount">$0</span></div>
      <div class="stmt-row highlight-red"><span class="stmt-label">Interest charge</span><span class="stmt-amount interest">$17.68</span></div>
      <div class="stmt-row subtotal"><span class="stmt-label">Closing balance</span><span class="stmt-amount">$17.68</span></div>
    </div>
  </div>
  

  <div class="section-lbl">What most people get wrong</div>
  <div class="box amber">
    <div class="box-lbl">It is NOT just about the due date</div>
    Customers think:
    <br>“I paid it off, so no interest”
    <br><br>
    Reality:
    <ul>
      <li>Interest may have already been accruing BEFORE they paid</li>
      <li>If they lost their interest-free period, it applies <strong>retroactively</strong></li>
    </ul>
  </div>


  <div class="section-lbl">Transaction types matter</div>
  <div style="display:flex;flex-direction:column;gap:7px;margin-bottom:12px">
    ${[
      ['var(--green)','Purchases','Interest-free period applies ONLY if full balance is paid by due date'],
      ['var(--red)','Cash advances','Interest starts immediately - NO interest-free period'],
      ['var(--brand)','Balance transfers','Separate rate and rules - does NOT behave like purchases'],
    ].map(([col,title,text])=>`
      <div style="display:flex;gap:10px;padding:8px 10px;background:var(--surface);border-radius:var(--r)">
        <div style="width:8px;height:8px;border-radius:99px;background:${col};margin-top:6px"></div>
        <div><div style="font-weight:600;font-size:12px">${title}</div><div style="font-size:12px;color:var(--t2)">${text}</div></div>
      </div>
    `).join('')}
  </div>

  <div class="divider"></div>
  <div class="section-lbl">Agent tips</div>
  <div class="agent-tip"><div class="at-lbl">Common question</div>
     <div class="at-q">"I paid it off - why am I still charged interest?"</div>
    <div class="at-a">
      Interest is charged daily while there is a balance.  
      If the full closing balance wasn’t paid by the due date in the previous cycle, interest starts from the purchase date and continues until the balance is cleared.  
      That interest is then added on the next statement.
    </div>
    </div>
  <div class="agent-tip"><div class="at-lbl">Common question</div>
    <div class="at-q">"I see interest on 2 statements in a row - is this a double charge?"</div>
    <div class="at-a">No. The first charge is interest for the unpaid balance period. The second is the gap between that statement date and when payment was finally received. Two separate accrual periods - both correct under Clause 5.3 of the Westpac Credit Card T&Cs.</div>
  </div>
`}

function renderStatement(){return `
  <div class="section-lbl">A typical credit card statement - annotated</div>
  <div class="stmt">
    <div class="stmt-head">
      <span class="stmt-head-title">Westpac Credit Card Statement</span>
      <span class="stmt-head-sub">Period: 1 Mar – 31 Mar 2025 · Account ****1234</span>
    </div>

    <div class="stmt-row head"><span>Account Summary</span></div>
    <div class="stmt-row"><span class="stmt-label" style="display:flex;align-items:center;gap:6px"><span class="stmt-callout" style="background:#5a5b7a">1</span> Opening Balance</span><span class="stmt-amount">$1,250.00</span></div>

    <div class="stmt-row head"><span>Transactions</span></div>
    <div class="stmt-row"><span class="stmt-label" style="display:flex;align-items:center;gap:6px"><span class="stmt-callout" style="background:var(--brand)">2</span> 03 Mar - Woolworths</span><span class="stmt-amount">$124.50</span></div>
    <div class="stmt-row"><span class="stmt-label" style="padding-left:24px">07 Mar - Netflix</span><span class="stmt-amount">$15.99</span></div>
    <div class="stmt-row"><span class="stmt-label" style="padding-left:24px">14 Mar - Shell Petrol</span><span class="stmt-amount">$89.70</span></div>

    <div class="stmt-row head"><span>Payments & Credits</span></div>
    <div class="stmt-row highlight-green"><span class="stmt-label" style="display:flex;align-items:center;gap:6px"><span class="stmt-callout" style="background:var(--green)">3</span> 18 Mar - Payment - Thank you</span><span class="stmt-amount neg">-$600.00</span></div>

    <div class="stmt-row head"><span>Interest & Fees</span></div>
    <div class="stmt-row highlight-red"><span class="stmt-label" style="display:flex;align-items:center;gap:6px"><span class="stmt-callout" style="background:var(--red)">4</span> 31 Mar - Interest Charge</span><span class="stmt-amount interest">$14.32</span></div>
    <div class="stmt-row highlight-amber"><span class="stmt-label" style="display:flex;align-items:center;gap:6px"><span class="stmt-callout" style="background:var(--amber)">5</span> 31 Mar - Annual Card Fee</span><span class="stmt-amount">$175.00</span></div>

    <div class="stmt-row total"><span class="stmt-label" style="display:flex;align-items:center;gap:6px"><span class="stmt-callout" style="background:var(--navy)">6</span> Closing Balance</span><span class="stmt-amount brand">$1,069.51</span></div>
    <div class="stmt-row highlight-blue"><span class="stmt-label" style="display:flex;align-items:center;gap:6px"><span class="stmt-callout" style="background:var(--brand)">7</span> Minimum Payment Due</span><span class="stmt-amount brand">$21.39</span></div>
    <div class="stmt-row"><span class="stmt-label" style="display:flex;align-items:center;gap:6px"><span class="stmt-callout" style="background:var(--navy)">8</span> Payment Due Date</span><span class="stmt-amount">15 Apr 2025</span></div>
  </div>

  <div class="section-lbl">What each number means</div>
  <div style="display:flex;flex-direction:column;gap:7px;margin-bottom:12px">
    ${[
      ['1','#5a5b7a','Opening Balance','What was owed at the start of this statement period - the closing balance from last month.'],
      ['2','var(--brand)','Transactions','All purchases made this period. Interest and fees are NOT included here - they have their own section.'],
      ['3','var(--green)','Payments & Credits','Money the customer paid in, plus any refunds. Shown as negative (reduces what they owe).'],
      ['4','var(--red)','Interest Charge','The daily interest accrued over the period, totalled and posted at statement end. Only appears if they carried a balance.'],
      ['5','var(--amber)','Fees','Annual card fee, cash advance fee, missed payment fee, etc. These are separate from interest.'],
      ['6','var(--navy)','Closing Balance','What they owe right now. = Opening + Transactions − Payments + Interest + Fees.'],
      ['7','var(--brand)','Minimum Payment Due','The least they must pay to avoid a $20 missed payment fee. Paying only the minimum means interest accrues on the rest.'],
      ['8','var(--navy)','Payment Due Date','The deadline. Pay the full closing balance by this date to keep the interest-free period.'],
    ].map(([n,col,title,text])=>`
      <div style="display:flex;gap:10px;align-items:flex-start;padding:8px 10px;background:var(--surface);border-radius:var(--r)">
        <div style="width:20px;height:20px;border-radius:99px;background:${col};color:#fff;font-size:10px;font-weight:700;display:grid;place-items:center;flex-shrink:0;margin-top:1px">${n}</div>
        <div><div style="font-size:12px;font-weight:600;color:var(--t1);margin-bottom:2px">${title}</div><div style="font-size:12px;color:var(--t2);line-height:1.5">${text}</div></div>
      </div>`).join('')}
  </div>

  <div class="divider"></div>
  <div class="section-lbl">Agent tips</div>
  <div class="agent-tip"><div class="at-lbl">Common question</div>
    <div class="at-q">"What is the difference between the closing balance and the minimum payment?"</div>
    <div class="at-a">The closing balance is the full amount owed. The minimum payment is the least they must pay to avoid a late fee - but paying only the minimum means interest accrues on everything else. To keep interest-free days, they must pay the full closing balance (or Monthly Payment Balance if they have a SmartPlan or Balance Transfer).</div>
  </div>
  <div class="agent-tip"><div class="at-lbl">Common question</div>
    <div class="at-q">"Why do I see both interest AND fees on my statement?"</div>
    <div class="at-a">They're different things. Interest is charged on the balance they carried day-to-day. Fees are fixed charges for specific events - like the annual card fee or a missed payment fee. A customer can have a fee without any interest (e.g. if they paid in full but still got charged the annual fee).</div>
  </div>
`}

function renderBalanceXfr(){return `
  <div class="section-lbl">What is a balance transfer?</div>
  <div class="box blue"><div class="box-lbl">Simple definition</div>
    A balance transfer moves debt from a higher-interest card to a Westpac card at a lower (often 0%) promotional rate for a set period. It doesn't reduce what you owe - it changes where you owe it and at what rate.
  </div>

  <div class="section-lbl">Before & after</div>
  <div class="two-col">
    <div style="background:var(--red-bg);border:1px solid var(--red-bdr);border-radius:var(--rl);padding:1rem;text-align:center">
      <div style="font-size:10px;text-transform:uppercase;font-weight:700;color:var(--red);margin-bottom:.5rem">Other bank card - BEFORE</div>
      <div style="font-size:24px;font-weight:700;color:var(--t1)">$5,000</div>
      <div style="font-size:12px;color:var(--t2);margin-top:4px">At 22% p.a.</div>
      <div style="font-size:11px;color:var(--red);margin-top:6px;font-weight:600">≈ $3.01/day interest</div>
    </div>
    <div style="background:var(--green-bg);border:1px solid var(--green-bdr);border-radius:var(--rl);padding:1rem;text-align:center">
      <div style="font-size:10px;text-transform:uppercase;font-weight:700;color:var(--green);margin-bottom:.5rem">Westpac card - AFTER</div>
      <div style="font-size:24px;font-weight:700;color:var(--t1)">$5,000</div>
      <div style="font-size:12px;color:var(--t2);margin-top:4px">At 0% for 20 months</div>
      <div style="font-size:11px;color:var(--green);margin-top:6px;font-weight:600">$0/day interest (promo period)</div>
    </div>
  </div>

  <div class="section-lbl">The timeline - what agents must explain</div>
  <div style="position:relative;margin:1.5rem 0 1rem;padding:0 8px">
    <div style="height:8px;border-radius:99px;overflow:hidden;display:flex">
      <div style="width:72%;background:var(--green);display:flex;align-items:center;padding-left:10px"><span style="font-size:10px;font-weight:600;color:#fff">0% promotional period (20 months)</span></div>
      <div style="width:28%;background:var(--red);display:flex;align-items:center;justify-content:flex-end;padding-right:8px"><span style="font-size:10px;font-weight:600;color:#fff">Standard rate</span></div>
    </div>
    <div style="display:flex;justify-content:space-between;margin-top:8px;font-size:10px;color:var(--t2)">
      <span>Transfer date (Day 1)<br><span style="font-style:italic">Interest starts immediately on BT</span></span>
      <span style="text-align:center">Month 20<br><span style="color:var(--red);font-weight:600">Promo ends!</span></span>
      <span style="text-align:right">Remaining balance →<br>reverts to purchase/cash rate</span>
    </div>
  </div>

  <div class="section-lbl">How it appears on a statement</div>
  <div class="stmt">
    <div class="stmt-head"><span class="stmt-head-title">Account Summary - Balance Transfer Active</span></div>
    <div class="stmt-row"><span class="stmt-label">Main Account Balance</span><span class="stmt-amount">$234.19</span></div>
    <div class="stmt-row highlight-blue"><span class="stmt-label">Balance Transfer Balance</span><span class="stmt-amount brand">$4,750.00</span></div>
    <div class="stmt-row total"><span class="stmt-label">Total Closing Balance</span><span class="stmt-amount brand">$4,984.19</span></div>
    <div class="stmt-row"><span class="stmt-label" style="color:var(--brand);font-size:11px">Monthly Payment Balance (pay this to keep interest free on purchases)</span><span class="stmt-amount brand" style="font-size:11px">$234.19</span></div>
  </div>

  <div class="box amber"><div class="box-lbl">⚠ Key rule agents must know</div>
    While a Balance Transfer is active, the customer must pay the <strong>Monthly Payment Balance</strong> (not the full closing balance) to keep their interest-free period on purchases. This is different from the normal "pay the closing balance" rule.
  </div>

  <div class="box red"><div class="box-lbl">Critical - what happens at end of promo period</div>
    Any remaining Balance Transfer balance reverts to the Purchase Balance or Cash Advance Balance (per the original offer terms) and starts attracting the standard rate. Customers should aim to pay it off before the promo ends. Not available on Westpac Lite.
  </div>

  <div class="divider"></div>
  <div class="section-lbl">Agent tips</div>
  <div class="agent-tip"><div class="at-lbl">Common question</div>
    <div class="at-q">"I did a balance transfer but I'm still being charged interest on my purchases."</div>
    <div class="at-a">When a Balance Transfer is active, the customer needs to pay the Monthly Payment Balance (shown on their statement) - not the full closing balance - to maintain interest-free on purchases. If they only paid the minimum, interest would have applied to purchases. Check what amount they paid last month.</div>
  </div>
  <div class="agent-tip"><div class="at-lbl">Common question</div>
    <div class="at-q">"Can I cancel a balance transfer?"</div>
    <div class="at-a">Balance transfers can't be cancelled once processed, but customers can pay off the balance transfer balance faster. The balance transfer fee (typically 3%) is charged upfront and is not refunded.</div>
  </div>
`}

    'Some transactions process even when the account is at or near the limit (e.g. pending authorisations). If the account was opened before June 2012, this fee may apply. For newer accounts, there is no overlimit fee. Confirm the account opening date to clarify. Reference: Clause 3.6.',
    'Westpac Credit Card T&Cs — Clause 3.6, pp.11–12 / westpac.com.au fees page'
  )}

  <!-- QUICK REFERENCE TABLE -->
  <div class="section-lbl" style="margin-top:.25rem">Quick reference — all charges at a glance</div>
  <div style="overflow-x:auto;border-radius:var(--rl);border:1px solid rgba(26,27,75,.12);margin-bottom:9px;
              box-shadow:0 2px 8px rgba(26,27,75,.06)">
    <table style="width:100%;border-collapse:collapse;font-size:11px;min-width:480px">

        <th style="padding:9px 11px;text-align:left;font-weight:600;font-size:10px;letter-spacing:.04em">Charge</th>
        <th style="padding:9px 11px;text-align:left;font-weight:600;font-size:10px;letter-spacing:.04em">Amount</th>
        <th style="padding:9px 11px;text-align:left;font-weight:600;font-size:10px;letter-spacing:.04em">Avoidable?</th>
        <th style="padding:9px 11px;text-align:left;font-weight:600;font-size:10px;letter-spacing:.04em">Westpac Lite?</th>
      </tr></thead>
      <tbody>
        ${[
          ['Purchase interest',    'Up to 20.99%',     '✓ Pay in full on time',          '✗ (9.90%)'],
          ['Cash advance interest','21.99%',            '✓ Use debit card',               '✓ Not offered'],
          ['BT interest',         'Promo → standard',  '✓ Pay off before promo ends',    '✓ Not offered'],
          ['SmartPlan interest',  'Varies',             'Partially',                      '✓ Not offered'],
          ['Annual/monthly fee',  '$108–$295/yr',       'Partially (Low Fee waiver)',      '✗ ($9/mo)'],
          ['Foreign txn fee',     '3%',                 '✓ Use Westpac Lite',             '✓ $0'],
          ['Cash advance fee',    '3.5%',               '✓ Use debit card',               '✓ Not offered'],
          ['Missed payment fee',  '$20',                '✓ Set up Autopay',               '✓ $0'],
          ['BT fee',              'Varies by offer',    'Partially',                      '✓ Not offered'],
          ['Rewards program fee', '$75/yr',             '✓ Use Altitude Rewards instead', 'n/a'],
          ['Overlimit fee',       '$15 (legacy only)',  '✓ Stay under credit limit',      'n/a'],
        ].map(([charge,amt,avoid,lite],i)=>`
          <tr style="border-bottom:.5px solid rgba(26,27,75,.07);${i%2===0?'background:#fff':'background:#f8f8fc'}">
            <td style="padding:7px 11px;color:#1A1B4B;font-weight:500">${charge}</td>
            <td style="padding:7px 11px;color:#5a5b7a;font-variant-numeric:tabular-nums">${amt}</td>
            <td style="padding:7px 11px;color:${avoid.startsWith('✓')?'#1a7a41':'#9596b2'}">${avoid}</td>

      </tbody>
    </table>
  </div>
  <div style="font-size:10px;color:#9596b2;padding:.25rem 0 .5rem;line-height:1.6">
    Sources: Westpac Credit Card T&Cs (27 June 2024) &middot; Westpac Altitude T&Cs (12 June 2024) &middot; westpac.com.au/personal-banking/credit-cards/manage/fees-interest/minimising-fees/ &middot; Fee changes effective 30 April 2026
  </div>`;
}



function renderPaidCheck(){
  // Helper to render a statement row with optional highlight and callout badge
  const row = (label, amount, cls='', badge='') => `
    <div class="stmt-row ${cls}">
      <span class="stmt-label" style="display:flex;align-items:center;gap:7px">
        ${badge ? `<span class="stmt-callout" style="background:${badge.color}">${badge.n}</span>` : ''}
        ${label}
      </span>
      <span class="stmt-amount ${cls.includes('neg')?'neg':cls.includes('interest')?'interest':cls.includes('brand')?'brand':''}">${amount}</span>
    </div>`;

  return `
  <div class="section-lbl">The core idea</div>
  <div class="box blue"><div class="box-lbl">Start with the date window, then check 3 numbers</div>
    To check if a customer paid in full, you only need <strong>3 numbers</strong> from last month’s statement. 
    Then narrow the account history to the period between the <strong>statement start date</strong> and the <strong>payment due date</strong>.
    <br><br>
    Once you are in that window, ignore normal purchases like groceries, petrol, dining, and subscriptions. Only focus on items that affect <strong>payments, credits, or the required balance</strong>.
  </div>

  <!-- DATE WINDOW -->
  <div class="section-lbl">Step 0 - zero in on the right period first</div>
  <div style="background:var(--surface);border-radius:var(--rl);padding:1rem;margin-bottom:12px;font-size:12px;line-height:1.65">
    <div style="display:flex;flex-direction:column;gap:8px">
      <div style="display:flex;gap:10px;align-items:flex-start">
        <div style="width:22px;height:22px;border-radius:99px;background:var(--navy);color:#fff;font-size:11px;font-weight:700;display:grid;place-items:center;flex-shrink:0;margin-top:1px">1</div>
        <div><strong>Find the statement start date.</strong><br><span style="color:var(--t2)">This is the beginning of the statement period. Payments before this date usually belong to the previous cycle, so do not start scanning too early.</span></div>
      </div>
      <div style="display:flex;gap:10px;align-items:flex-start">
        <div style="width:22px;height:22px;border-radius:99px;background:var(--brand);color:#fff;font-size:11px;font-weight:700;display:grid;place-items:center;flex-shrink:0;margin-top:1px">2</div>
        <div><strong>Find the payment due date.</strong><br><span style="color:var(--t2)">This is the deadline. Payments after this date may reduce the balance, but they do not count as paid on time for that statement.</span></div>
      </div>
      <div style="display:flex;gap:10px;align-items:flex-start">
        <div style="width:22px;height:22px;border-radius:99px;background:var(--green);color:#fff;font-size:11px;font-weight:700;display:grid;place-items:center;flex-shrink:0;margin-top:1px">3</div>
        <div><strong>Search only inside that window.</strong><br><span style="color:var(--t2)">Once the date range is narrowed, the payments are much easier to spot because you are no longer scanning the whole account history like a detective with no budget.</span></div>
      </div>
    </div>
  </div>

  <div style="position:relative;margin:1.3rem 0 1.6rem;padding:0 8px">
    <div style="height:8px;background:linear-gradient(90deg,var(--navy),var(--brand),var(--green));border-radius:99px;position:relative"></div>
    <div style="display:flex;justify-content:space-between;margin-top:9px;font-size:10px;color:var(--t2)">
      <span><strong>1 Feb</strong><br>Statement starts</span>
      <span style="text-align:center"><strong>28 Feb</strong><br>Statement closes</span>
      <span style="text-align:right"><strong>15 Mar</strong><br>Payment due</span>
    </div>
    <div style="text-align:center;margin-top:8px;font-size:11px;color:var(--brand);font-weight:600">Scan this window for payments and credits</div>
  </div>

  <!-- THE 3 NUMBERS -->
  <div class="section-lbl">The 3 numbers that matter</div>
  <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:14px">
    ${[
      ['1','#1a7a41','Required payment amount','The amount they <em>needed</em> to pay. This is either the <strong>Closing Balance</strong> (standard) or the <strong>Monthly Payment Balance</strong> if they have a SmartPlan, Balance Transfer, or PartPay Card.'],
      ['2','#4A4AF9','Payment received','The amount they actually paid, shown as a negative credit (e.g. −$1,200.00). Add all payments posted inside the statement-start-to-due-date window. Use the <strong>posted/cleared date</strong>, not when the customer says they initiated the payment.'],
      ['3','#92600a','Due date','The deadline the payment had to clear by. Paying after this date breaks the interest-free period even if the amount was correct.'],
    ].map(([n,col,title,text])=>`
      <div style="display:flex;gap:11px;align-items:flex-start;padding:10px 12px;background:var(--surface);border-radius:var(--r)">
        <div style="width:22px;height:22px;border-radius:99px;background:${col};color:#fff;font-size:11px;font-weight:700;display:grid;place-items:center;flex-shrink:0;margin-top:1px">${n}</div>
        <div><div style="font-size:12px;font-weight:600;color:var(--t1);margin-bottom:3px">${title}</div><div style="font-size:12px;color:var(--t2);line-height:1.55">${text}</div></div>
      </div>`).join('')}
  </div>

  <!-- WHICH FIGURE TO USE -->
  <div class="section-lbl">Step 1 - which "required payment" figure to use?</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:12px">
    <div style="background:var(--green-bg);border:1px solid var(--green-bdr);border-radius:var(--rl);padding:.9rem">
      <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--green);margin-bottom:.5rem">Standard account</div>
      <div style="font-size:13px;color:var(--t1);line-height:1.5">No SmartPlan, no Balance Transfer, no PartPay Card active</div>
      <div style="margin-top:.6rem;font-size:13px;font-weight:600;color:var(--green)">→ Look for: Closing Balance</div>
    </div>
    <div style="background:var(--brand-lt);border:1px solid var(--brand-mid);border-radius:var(--rl);padding:.9rem">
      <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--brand);margin-bottom:.5rem">Has SmartPlan / BT / PartPay</div>
      <div style="font-size:13px;color:var(--t1);line-height:1.5">Any of these features active on the account</div>
      <div style="margin-top:.6rem;font-size:13px;font-weight:600;color:var(--brand)">→ Look for: Monthly Payment Balance</div>
    </div>
  </div>

  <!-- SCENARIO A: PAID IN FULL -->
  <div class="section-lbl">Scenario A - paid in full ✓</div>
  <div class="stmt" style="margin-bottom:5px">
    <div class="stmt-head"><span class="stmt-head-title">February Statement</span><span class="stmt-head-sub">Period: 1 Feb – 28 Feb · Due: 15 Mar</span></div>
    <div class="stmt-row" style="opacity:.4"><span class="stmt-label" style="font-style:italic;font-size:11px">… purchases inside the period (skip unless payment/credit related) …</span><span></span></div>
    ${row('Closing Balance','$1,200.00','total',{n:'1',color:'#1a7a41'})}
    ${row('Payment received - 12 Mar','−$1,200.00','highlight-green',{n:'2',color:'#4A4AF9'})}
    ${row('Due date','15 Mar','')}
  </div>
  <div class="box green" style="margin-bottom:14px"><div class="box-lbl">✓ Paid in full - on time</div>
    Payment (−$1,200) = Closing Balance ($1,200). Payment cleared on 12 Mar, which falls inside the statement-start-to-due-date window and before the due date. Interest-free period is maintained.
    <br><br>
    If interest appears on the next statement, it may be <strong>residual interest</strong>: interest that was already accruing before the payment was made and only appeared on the following statement.
  </div>

  <!-- SCENARIO B: PARTIAL PAYMENT -->
  <div class="section-lbl">Scenario B - paid partially ✗</div>
  <div class="stmt" style="margin-bottom:5px">
    <div class="stmt-head"><span class="stmt-head-title">February Statement</span><span class="stmt-head-sub">Period: 1 Feb – 28 Feb · Due: 15 Mar</span></div>
    <div class="stmt-row" style="opacity:.4"><span class="stmt-label" style="font-style:italic;font-size:11px">… purchases inside the period (skip unless payment/credit related) …</span><span></span></div>
    ${row('Closing Balance','$1,200.00','total',{n:'1',color:'#1a7a41'})}
    ${row('Payment received - 12 Mar','−$500.00','highlight-amber',{n:'2',color:'#4A4AF9'})}
    ${row('Due date','15 Mar','')}
  </div>
  <div class="box amber" style="margin-bottom:14px"><div class="box-lbl">✗ Not paid in full</div>
    Payment (−$500) &lt; Closing Balance ($1,200). The $700 shortfall means the required amount was not covered by the due date. Interest can appear on the next statement. This is one of the common causes of "I paid but still got charged interest."
  </div>

  <!-- SCENARIO C: PAID LATE -->
  <div class="section-lbl">Scenario C - paid in full but late ✗</div>
  <div class="stmt" style="margin-bottom:5px">
    <div class="stmt-head"><span class="stmt-head-title">February Statement</span><span class="stmt-head-sub">Period: 1 Feb – 28 Feb · Due: 15 Mar</span></div>
    <div class="stmt-row" style="opacity:.4"><span class="stmt-label" style="font-style:italic;font-size:11px">… purchases inside the period (skip unless payment/credit related) …</span><span></span></div>
    ${row('Closing Balance','$1,200.00','total',{n:'1',color:'#1a7a41'})}
    ${row('Payment received - 19 Mar','−$1,200.00','highlight-red',{n:'2',color:'#4A4AF9'})}
    ${row('Due date','15 Mar (payment cleared 4 days late)','')}
  </div>
  <div class="box red" style="margin-bottom:14px"><div class="box-lbl">✗ Correct amount, wrong timing</div>
    Payment amount matches, but it cleared on 19 Mar, after the 15 Mar due date. Interest can apply because the required amount was not cleared by the deadline. Amount correct does not mean interest-free if the timing is wrong.
  </div>

  <!-- SCENARIO D: DID NOT MEET MINIMUM PAYMENT -->
<div class="section-lbl">Scenario D - minimum payment not met ✗</div>
<div class="stmt" style="margin-bottom:5px">
  <div class="stmt-head">
    <span class="stmt-head-title">February Statement</span>
    <span class="stmt-head-sub">Period: 1 Feb – 28 Feb · Due: 15 Mar</span>
  </div>
  <div class="stmt-row" style="opacity:.4">
    <span class="stmt-label" style="font-style:italic;font-size:11px">
      … purchases inside the period (skip unless payment/credit related) …
    </span>
    <span></span>
  </div>
  ${row('Closing Balance','$1,200.00','total',{n:'1',color:'#1a7a41'})}
  ${row('Minimum Payment Due','$25.00','highlight-blue',{n:'1b',color:'#92600a'})}
  ${row('Payment received - 12 Mar','−$10.00','highlight-red',{n:'2',color:'#4A4AF9'})}
  ${row('Due date','15 Mar','')}
</div>

<div class="box red" style="margin-bottom:14px">
  <div class="box-lbl">✗ Minimum payment not met</div>
  The payment made was less than the minimum payment due. As a result, the account is considered overdue.  
  A <strong>missed payment fee</strong> may be charged, and interest will continue to accrue on the outstanding balance.
</div>

  <!-- SCENARIO E: MONTHLY PAYMENT BALANCE (SmartPlan/BT/PartPay) -->
  <div class="section-lbl">Scenario D - account has SmartPlan / Balance Transfer / PartPay</div>
  <div class="stmt" style="margin-bottom:5px">
    <div class="stmt-head"><span class="stmt-head-title">February Statement - SmartPlan active</span><span class="stmt-head-sub">Period: 1 Feb – 28 Feb · Due: 15 Mar</span></div>
    <div class="stmt-row" style="opacity:.4"><span class="stmt-label" style="font-style:italic;font-size:11px">… transactions inside the period (skip unless payment/credit related) …</span><span></span></div>
    ${row('SmartPlan Balance','$2,000.00','highlight-blue')}
    ${row('Closing Balance (total)','$3,200.00','total',{n:'1',color:'#92600a'})}
    ${row('Monthly Payment Balance','$1,200.00','highlight-blue',{n:'1b',color:'#1a7a41'})}
    ${row('Payment received - 14 Mar','−$1,200.00','highlight-green',{n:'2',color:'#4A4AF9'})}
    ${row('Due date','15 Mar','')}
  </div>
  <div class="box green" style="margin-bottom:6px"><div class="box-lbl">✓ Correct - they paid the Monthly Payment Balance, not the full closing balance</div>
    When a SmartPlan, Balance Transfer, or PartPay Card is active, the customer only needs to pay the <strong>Monthly Payment Balance</strong> ($1,200) - not the full closing balance ($3,200) - to keep their interest-free period. The payment cleared inside the correct date window and before the due date.
  </div>
  <div class="box amber"><div class="box-lbl">Common agent mistake</div>
    If an agent sees Closing Balance = $3,200 and payment = $1,200 and concludes "they underpaid" - that's wrong. Always check whether a Monthly Payment Balance figure exists before drawing that conclusion. 
  </div>

  <div class="divider"></div>

  <!-- QUICK CHECK FLOWCHART -->
  <div class="section-lbl">Quick check - flowchart</div>
  <div style="background:var(--surface);border-radius:var(--rl);padding:1rem;margin-bottom:12px;font-size:12px;line-height:1.75">
    <div style="display:flex;flex-direction:column;gap:8px">
      <div><strong>1. Find the date window first</strong><br><span style="color:var(--t2)">Statement start date → payment due date.</span></div>
      <div><strong>2. Search that window for payments/credits</strong><br><span style="color:var(--t2)">Use posted or cleared dates, not initiated dates.</span></div>
      <div><strong>3. Does the statement show a Monthly Payment Balance?</strong><br><span style="color:var(--t2)">YES: use Monthly Payment Balance. NO: use Closing Balance.</span></div>
      <div><strong>4. Did total payments ≥ required amount?</strong><br><span style="color:var(--t2)">NO: not paid in full. YES: continue.</span></div>
      <div><strong>5. Did the payments clear on or before the due date?</strong><br><span style="color:var(--t2)">NO: paid late. YES: paid in full and on time.</span></div>
    </div>
  </div>

  <div class="divider"></div>
  <div class="section-lbl">Agent tips</div>
  <div class="agent-tip"><div class="at-lbl">Common question</div>
    <div class="at-q">"There are too many transactions - where do I even start?"</div>
    <div class="at-a">Start with the statement start date and the payment due date. Search only inside that window first. Then scan for payments and credits, not purchases. Once the window is narrowed, you only need to compare the total paid against the Closing Balance or Monthly Payment Balance.</div>
  </div>
  <div class="agent-tip"><div class="at-lbl">Common question</div>
    <div class="at-q">"I paid my card - why do I have interest on my statement?"</div>
    <div class="at-a">Pull up last month's statement. First check the statement start date and due date so you are looking at the right period. Then find the Closing Balance (or Monthly Payment Balance if SmartPlan/BT/PartPay is active). Add payments that cleared within that period and by the due date. If the total paid was less than the required amount, or cleared after the due date, say: "Last month your required payment was $X and we received $Y on [date], which was [short / after the due date]. That's why interest appeared."</div>
  </div>
  <div class="agent-tip"><div class="at-lbl">Common question</div>
    <div class="at-q">"I paid every month - how do I make sure this doesn't happen again?"</div>
    <div class="at-a">Recommend Autopay set to "Monthly Payment Balance" (if they have a SmartPlan or Balance Transfer) or "Closing Balance" (if standard). This ensures the exact required amount is always paid on time regardless of what that figure is. Direct them to westpac.com.au/autopay or Online Banking to set it up.</div>
  </div>
  <div class="agent-tip"><div class="at-lbl">Common question</div>
    <div class="at-q">"I paid more than the minimum - does that count as paying in full?"</div>
    <div class="at-a">Only if they paid at least the full Closing Balance (or Monthly Payment Balance). Paying more than the minimum payment is good, but it doesn't maintain the interest-free period unless the full required amount was covered. The minimum payment just avoids the missed payment fee - it is not the threshold for interest-free.</div>
  </div>`;
}


function renderTopic(t){
  const contentMap = {
    interest:    renderInterest,
    statement:   renderStatement,
    paid_check:  renderPaidCheck,
    fees:        renderFees,
    balance_xfr: renderBalanceXfr,
    smartplan:   renderSmartplan,
    partpay:     renderPartpay,
  };
  const body = contentMap[t.id] ? contentMap[t.id]() : '<p>Coming soon.</p>';
  return `
    <div class="topic-hdr">
      <div class="th-inner">
        <div class="th-icon" style="background:${t.bg}">${t.icon}</div>
        <div><div class="th-title">${escH(t.label)}</div><div class="th-sub">${escH(t.sub)}</div></div>
      </div>
      <button class="btn" onclick="goHome()">← Back</button>
    </div>
    <div class="content">${body}</div>`;
}

function goHome(){ S.screen='home'; S.topicId=null; render(); window.scrollTo(0,0); }
function goTopic(id){ S.topicId=id; S.screen='topic'; render(); window.scrollTo(0,0); }

function toggleMobileMenu(){
  const sidebar = document.querySelector('.sidebar');
  const btn = document.querySelector('.mobile-menu-btn');
  const isOpen = sidebar.classList.toggle('menu-open');
  if(btn) btn.setAttribute('aria-expanded', String(isOpen));
}
render();
</script>
