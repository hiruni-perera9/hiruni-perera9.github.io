// ── VOICE ENGINE ───────────────────────────────────────────────
function normalize(s){return s.toLowerCase().replace(/[^\w\s]/g,'').replace(/\s+/g,' ').trim()}

function scoreTopics(raw){
  const input=normalize(raw);
  const results=[];
  for(const[tid,phrases]of Object.entries(VOICE_KEYWORDS)){
    let hits=0;
    for(const phrase of phrases){
      const norm=normalize(phrase);
      if(input.includes(norm)) hits+=norm.split(' ').length;
    }
    if(hits>0){
      const score=hits/Math.max(input.split(' ').length,3);
      results.push({tid,score});
    }
  }
  return results.sort((a,b)=>b.score-a.score);
}

};

// ── SPEECH RECOGNITION ─────────────────────────────────────────
let recognition=null;
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
const hasVoice=!!SR;

if(hasVoice){
  recognition=new SR();
  recognition.continuous=false;
  recognition.interimResults=true;
  recognition.lang='en-AU';
  recognition.onresult=e=>{
    const t=Array.from(e.results).map(r=>r[0].transcript).join('');
    S.transcript=t;
    if(e.results[0].isFinal){recognition.stop();handleVoice(t);}
    else{S.voiceState='listening';render();}
  };
  recognition.onerror=()=>{S.voiceState='idle';render();};
  recognition.onend=()=>{if(S.voiceState==='listening'){S.voiceState='idle';render();}};
}

function toggleMic(){
  if(!hasVoice)return;
  if(S.voiceState==='listening'){recognition.stop();S.voiceState='idle';render();return;}
  S.voiceState='listening';S.transcript='';S.suggestions=[];
  render();
  try{recognition.start();}catch(e){S.voiceState='idle';render();}
}

function handleVoice(raw){
  const scored=scoreTopics(raw);
  S.transcript=raw;
  if(!scored.length){
    // No match - open escalation table with transcript pre-filled
    S.voiceState='idle';
    openEsc(raw,'No matching flow found for: "'+raw+'"');
    return;
  }
  if(scored[0].score>=0.35&&scored.length===1){
    // High confidence single match - jump straight in
    S.voiceState='idle';
    goTopic(scored[0].tid);
    return;
  }
  // Medium confidence - show suggestions
  S.voiceState='heard';
  S.suggestions=scored.slice(0,4).map(r=>{
    const t=TOPICS.find(x=>x.id===r.tid);
    return{tid:r.tid,score:r.score,label:t.label,icon:t.icon,high:r.score>=0.35};
  });
  render();
}

// ── ESCALATION ─────────────────────────────────────────────────
function openEsc(question='',resources=''){
  S.showEsc=true;
  S.escQuestion=question;
  S.escResources=resources;
  S.escCustId='';S.escContext='';S.copyState='idle';
  render();
  // Scroll escalation into view
  setTimeout(()=>{const el=document.getElementById('esc-panel');if(el)el.scrollIntoView({behavior:'smooth',block:'start'});},80);
}

function clearEsc(){
  S.showEsc=false;S.voiceState='idle';S.transcript='';S.suggestions=[];
  S.escCustId='';S.escQuestion='';S.escContext='';S.escResources='';S.copyState='idle';
  render();
}

function copyEscalation(){
  // Sync textarea values from DOM before copying (in case of fast typing)
  const q=document.getElementById('esc-q');
  const ctx=document.getElementById('esc-ctx');
  const res=document.getElementById('esc-res');
  const cid=document.getElementById('esc-cid');
  if(q)S.escQuestion=q.value;
  if(ctx)S.escContext=ctx.value;
  if(res)S.escResources=res.value;
  if(cid)S.escCustId=cid.value;

  const lines=[
    '📋 *SUPPORT REQUEST*',
    '─────────────────────────',
    '*Customer ID/CIS:* '+(S.escCustId||'(not provided)'),
    '*Issue:* '+(S.escQuestion||'(not described)'),
    '*Additional context:* '+(S.escContext||'(none)'),
    '*Resources checked:* '+(S.escResources||'(none)'),
    '─────────────────────────',
    'Please advise 🙏',
  ];
  navigator.clipboard.writeText(lines.join('\n')).then(()=>{
    S.copyState='copied';render();
    setTimeout(()=>{S.copyState='idle';render();},2500);
  });
}

  const filtered=TOPICS.filter(t=>!q||(t.label+t.desc).toLowerCase().includes(q));
  const cxMap={complex:'cx-complex',medium:'cx-medium',simple:'cx-simple'};
  const cxLabel={complex:'Complex flow',medium:'Medium flow',simple:'Simple flow'};

  const cards=filtered.length
    ?filtered.map(t=>`
      <div class="topic-card" onclick="goTopic('${t.id}')">
        <div class="tc-icon" style="background:${t.bg}">${t.icon}</div>
        <div class="tc-lbl">${escHtml(t.label)}</div>
        <div class="tc-desc">${escHtml(t.desc)}</div>
        <div class="complexity ${cxMap[t.cx]}">${cxLabel[t.cx]}</div>
      </div>`).join('')
    :`<div class="no-match">No topics match "<strong>${escHtml(S.search)}</strong>"</div>`;

  return `
    <div class="home-head">
      <h1>What's the call about?</h1>
      <p>Search by typing, or tap the mic to speak a phrase - e.g. "dispute", "lost card", "travelling overseas".</p>
    </div>
    ${renderVoicePanel()}
    <div class="esc-trigger-row">
      <button class="esc-trigger-btn" onclick="openEsc()">⚑ Can't find it? Log a support request</button>
    </div>
    <div class="topic-grid">${cards}</div>
    ${S.showEsc?renderEscalation():''}
  `;
}

function renderVoicePanel(){
  const listening=S.voiceState==='listening';
  const micClass='mic-btn'+(listening?' listening':'')+(hasVoice?'':' no-support');

  let statusHtml='';
  if(S.voiceState==='listening'){
    statusHtml=`<div class="voice-status">
      <div class="vs-listening"><i class="fa-solid fa-microphone"></i> ${S.transcript?`Hearing: "<em>${escHtml(S.transcript)}</em>"`:'Listening - speak now…'}</div>
    </div>`;
  } else if(S.voiceState==='heard'&&S.transcript){
    statusHtml=`<div class="voice-status">
      <div class="vs-heard"><i class="fa-solid fa-microphone"></i> Heard: <strong>"${escHtml(S.transcript)}"</strong></div>
    </div>`;
  }

  let sugHtml='';
  if(S.voiceState==='heard'&&S.suggestions.length){
    const chips=S.suggestions.map(s=>`
      <button class="sug-chip" onclick="goTopic('${s.tid}')">
        <span>${s.icon}</span><span>${escHtml(s.label)}</span>
        <span class="conf ${s.high?'conf-high':'conf-med'}">${s.high?'Strong match':'Possible'}</span>
      </button>`).join('');
    sugHtml=`
      <div class="sug-lbl">Did you mean?</div>
      <div class="sug-chips">${chips}</div>
      <button class="btn" style="margin-top:10px;width:100%" onclick="openEsc('${escJs(S.transcript)}','No flow matched for: &quot;'+S.transcript+'&quot;')">
        None of these - log a support request
      </button>`;
  }

  return `
    <div class="voice-panel">
      <div class="voice-row">
        <div class="search-wrap">
          <input id="srch" class="search" type="text" placeholder="Search topics - e.g. dispute, overseas, fees…" value="${escHtml(S.search)}" oninput="doSearch(this.value)" autocomplete="off">
        </div>
        <button class="${micClass}" onclick="${hasVoice?'toggleMic()':'void(0)'}" title="${hasVoice?(listening?'Stop listening':'Tap to speak'):'Voice not available in this browser'}" aria-label="Voice search">
          ${listening
            ? '<i class="fa-solid fa-stop" style="font-size:14px"></i>'
            : '<i class="fa-solid fa-microphone" style="font-size:15px"></i>'
          }
        </button>
      </div>
      ${statusHtml}
      ${sugHtml}
      ${!hasVoice?'<div class="no-support-note">Voice input is available in Chrome and Edge only.</div>':''}
    </div>
  `;
}

function renderEscalation(){
  return `
    <div class="esc-panel" id="esc-panel">
      <div class="esc-header">
        <div>
          <div class="esc-title">⚑ Log a Support Request</div>
          <div class="esc-sub">Fill in the details, then copy and paste into your team chat to ask for help.</div>
        </div>
        <button class="btn" onclick="clearEsc()" style="flex-shrink:0;margin-left:12px">✕ Close</button>
      </div>

      <div class="esc-field">
        <label for="esc-cid">Customer ID/CIS</label>
        <input id="esc-cid" class="esc-input" type="text" placeholder="Leave blank - fill in after the call if needed" value="${escHtml(S.escCustId)}" oninput="S.escCustId=this.value">
      </div>

      <div class="esc-field">
        <label for="esc-q">Question</label>
        <textarea id="esc-q" class="esc-input" rows="3" placeholder="Describe the customer's problem in your own words…">${escHtml(S.escQuestion)}</textarea>
      </div>

      <div class="esc-field">
        <label for="esc-ctx">Additional Information</label>
        <textarea id="esc-ctx" class="esc-input" rows="2" placeholder="Account flags, what the customer said, any system messages…">${escHtml(S.escContext)}</textarea>
      </div>

      <div class="esc-field">
        <label for="esc-res">Resources Used</label>
        <textarea id="esc-res" class="esc-input" rows="2" placeholder="What you've already tried or checked…">${escHtml(S.escResources)}</textarea>
      </div>

      <div class="copy-row">
        <button class="copy-btn${S.copyState==='copied'?' copied':''}" onclick="copyEscalation()">
          ${S.copyState==='copied'?'✓ Copied!':'📋 Copy to team chat'}
        </button>
        <button class="clear-btn" onclick="clearEsc()">Cancel</button>
      </div>
      <div class="esc-notice">Formatted for Slack, Teams, or any team chat · Paste with Ctrl+V / ⌘V</div>
    </div>
  `;
}

function renderTopic(){
  const t=topic(S.topicId);
  const nId=S.nodeId||'pre';
  const n=getNode(S.topicId,nId);

  let bg='var(--white)',bdr='var(--bdr)',tagColor='var(--t3)',tagTxt='';
  if(n.type==='action'){tagTxt='Action needed';tagColor='var(--brand)';bdr='var(--brand-mid)';bg='var(--brand-lt)';}
  else if(n.type==='q'){tagTxt='Question';}
  else if(n.type==='info'||n.type==='out'){
    const sv=sevStyle(n.sev);tagTxt=n.type==='out'?sv.tag:'Note';tagColor=sv.color;bdr=sv.bdr;bg=sv.bg;
  }

  const bullets=n.bullets?`<ul class="step-bullets">${n.bullets.map(b=>`<li>${escHtml(b)}</li>`).join('')}</ul>`:'';
  const trail=S.hist.slice(-5).map((h,i,a)=>
    `<span class="trail-pill">${escHtml(h.label)}</span>${i<a.length-1?'<span class="trail-arrow">›</span>':''}`
  ).join('');

  let actions='';
  if(n.type==='q'){
    actions=`<div class="opts">${n.opts.map(o=>`<button class="btn-opt" onclick="gChoose('${o.n}','${escJs(o.l)}')">${escHtml(o.l)}</button>`).join('')}</div>`;
  } else if((n.type==='action'||n.type==='info')&&n.n){
    actions=`<button class="btn-p" onclick="gContinue()">Continue →</button>`;
  } else {
    // Terminal node - no Mark as Mastered, just navigation
    actions=`<div class="cta-row">
      <button class="btn-p" onclick="goHome()">← Back to Topics</button>
      <button class="btn-s" onclick="resetFlow()">Start Flow Over</button>
    </div>`;
  }

  return `
    <div class="topbar">
      <div>
        <button class="btn-back" onclick="goHome()" style="margin-bottom:8px">← All Topics</button>
        <div style="display:flex;align-items:center;gap:11px">
          <div class="tc-icon" style="background:${t.bg};width:42px;height:42px;font-size:20px;border-radius:12px;flex-shrink:0">${t.icon}</div>
          <div>
            <div style="font-size:16px;font-weight:600">${escHtml(t.label)}</div>
            <div style="font-size:12px;color:var(--t2);margin-top:1px">${escHtml(t.desc)}</div>
          </div>
        </div>
      </div>
    </div>
    <div class="flow-body">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem">
        <div style="font-size:11px;color:var(--t3)">Step ${S.hist.length+1}</div>
        <div style="display:flex;gap:7px">
          ${S.hist.length?`<button class="btn" onclick="gBack()">← Back</button>`:''}
          <button class="btn" onclick="resetFlow()">Restart</button>
        </div>
      </div>
      <div class="trail">${trail}</div>
      <div class="step-card" style="background:${bg};border-color:${bdr}">
        <div class="step-tag" style="color:${tagColor}">${tagTxt}</div>
        <div class="step-text">${escHtml(n.text)}</div>
        ${bullets}
      </div>
      ${actions}
    </div>
  `;
}

// ── ACTIONS ────────────────────────────────────────────────────
function goHome(){S.screen='home';S.voiceState='idle';render();}

function goTopic(id){
  S.topicId=id;S.screen='topic';S.nodeId=null;S.hist=[];
  S.voiceState='idle';S.transcript='';S.suggestions=[];
  render();
}

function doSearch(v){
  S.search=v;render();
  const el=document.getElementById('srch');
  if(el){el.focus();el.setSelectionRange(v.length,v.length);}
}

function gChoose(nextId,label){
  S.hist.push({nodeId:S.nodeId||'pre',label});S.nodeId=nextId;render();window.scrollTo(0,0);
}

function gContinue(){
  const cur=S.nodeId||'pre';
  const n=getNode(S.topicId,cur);
  if(n.n){S.hist.push({nodeId:cur,label:'Done'});S.nodeId=n.n;}
  render();window.scrollTo(0,0);
}

function gBack(){if(S.hist.length){const p=S.hist.pop();S.nodeId=p.nodeId;render();}}
function resetFlow(){S.nodeId=null;S.hist=[];render();}

render();
</script>
</body>
</html>
