  {id:'overseas_card',
   cat:'intl',   descs:['OVERSEAS TRANS  HARRODS  LONDON GBR','VISA DEBIT  FX AUD 134.56  GBP 70.00  UK'],

// ── CATEGORIES ─────────────────────────────────────────────────────────────────
const CATS = {
  card:   {label:'Card Purchases',           color:'#4A4AF9'},
  osko:   {label:'Fast Payments — Osko & NPP',color:'#0d7377'},
  bpay:   {label:'BPAY & Direct Debits',     color:'#c07a10'},
  xfer:   {label:'Bank Transfers',           color:'#1a7a41'},
  atm:    {label:'ATM & Cash',               color:'#374151'},
  credit: {label:'Incoming Credits',         color:'#166534'},
  cheque: {label:'Cheques',                  color:'#92400e'},
  intl:   {label:'International',            color:'#e05533'},
  fees:   {label:'Account Fees',             color:'#6b7280'},
};
const CAT_ORDER = ['card','osko','bpay','xfer','atm','credit','cheque','intl','fees'];

// ── TIMING LABELS ─────────────────────────────────────────────────────────────
const TIMING = {
  instant: {cls:'t-instant', label:'Instant 24/7'},
  same:    {cls:'t-same',    label:'Same day'},
  next:    {cls:'t-next',    label:'Next business day'},
  days:    {cls:'t-days',    label:'3–5 business days'},
};

// ── STATE ─────────────────────────────────────────────────────────────────────
let query = '', openId = null;

// ── SEARCH ────────────────────────────────────────────────────────────────────
function searchMatch(tx, q){
  if(!q) return true;
  const haystack = [
    tx.descs.join(' '),
    tx.brief,
    tx.what,
    tx.when.join(' '),
    tx.tags.join(' '),
  ].join(' ').toLowerCase();
  return haystack.includes(q);
}

function highlight(text, q){
  if(!q) return esc(text);
  return esc(text).replace(new RegExp(esc(q).replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'), m=>`<mark>${m}</mark>`);
}
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(){
  const q = query.trim().toLowerCase();
  const filtered = TX.filter(t => searchMatch(t, q));

  // ── BUILD ROW HTML (shared for both views) ──────────────────────────────
  function rowHtml(tx) {
    const isOpen = openId === tx.id;
    const tm = TIMING[tx.timing] || TIMING.same;

    const panel = isOpen ? `
      <div class="entry-panel">
        <div class="ep-inner">
          <div class="ep-descs">
            <div class="ep-desc-row">
              <span class="ep-label">Appears as</span>
              <div style="display:flex;flex-direction:column;gap:3px;flex:1">
                ${tx.descs.map((d,i)=>`<span class="ep-desc ${i>0?'alt':''}">${highlight(d,q)}</span>`).join('')}
              </div>
            </div>
          </div>
          <div class="ep-section">
            <div class="ep-sec-label">What it is</div>
            <div class="ep-text">${highlight(tx.what, q)}</div>
          </div>
          <div class="ep-section">
            <div class="ep-sec-label">When it appears</div>
            <div class="ep-items">
              ${tx.when.map(w=>`<div class="ep-item"><div class="ep-item-dot" style="background:${tx.color}"></div><span>${highlight(w,q)}</span></div>`).join('')}
            </div>
          </div>
          <div class="ep-section">
            <div class="ep-sec-label">Timing</div>
            <div class="ep-timing"><span class="timing-chip ${tm.cls}">${tm.label}</span><span>${esc(tx.tnote)}</span></div>
          </div>
          ${tx.fraud ? `<div class="ep-fraud"><div class="ep-fraud-lbl">⚠ Fraud &amp; dispute note</div><div class="ep-fraud-text">${esc(tx.fraud)}</div></div>` : ''}
          <div class="ep-agent">
            <div class="ep-agent-lbl">Agent tip</div>
            <div class="ep-agent-q">"${esc(tx.agentQ)}"</div>
            <div class="ep-agent-a">${esc(tx.agentA)}</div>
          </div>
        </div>
      </div>` : '';

    return `
      <div class="entry${isOpen?' open':''}" id="entry-${tx.id}" onclick="toggle('${tx.id}')">
        <div class="entry-row">
          <div class="entry-dot" style="background:${tx.color}"></div>
          <div class="entry-desc-wrap">
            <div class="entry-desc">${highlight(tx.descs[0], q)}</div>
            <div class="entry-brief">${highlight(tx.brief, q)}</div>
          </div>
          <div class="entry-right">
            <span class="timing-chip ${tm.cls}">${tm.label}</span>
            <span class="expand-icon">›</span>
          </div>
        </div>
        ${panel}
      </div>`;
  }

  // ── CATEGORISED VIEW (no search query) ─────────────────────────────────
  let body = '';
  if (!q) {
    const countLine = `<div class="result-count">${TX.length} transaction types — tap any row to expand</div>`;
    const sections = CAT_ORDER.map(catId => {
      const cat = CATS[catId];
      const types = TX.filter(t => t.cat === catId);
      if (!types.length) return '';
      return `
        <div class="cat-section">
          <div class="cat-header" style="background:${cat.color}0d">
            <span class="cat-label" style="color:${cat.color}">${cat.label}</span>
            <span class="cat-count">${types.length} type${types.length!==1?'s':''}</span>
          </div>
          ${types.map(tx => rowHtml(tx)).join('')}
        </div>`;
    }).join('');
    body = countLine + sections;

  // ── FILTERED FLAT VIEW (active search query) ────────────────────────────
  } else {
    if (!filtered.length) {
      body = `<div class="no-results">No match for "<strong>${esc(query)}</strong>" — try a shorter keyword like "OSKO", "direct debit", or "ATM".</div>`;
    } else {
      body = `<div class="result-count">${filtered.length} of ${TX.length} types match "${esc(query)}"</div>`
           + filtered.map(tx => rowHtml(tx)).join('');
    }
  }

  document.getElementById('app').innerHTML = `
    
    <div class="shell">
      <div class="search-wrap">
        <div class="search-row">
          <span class="search-icon">🔍</span>
          <input id="srch" class="search-input" type="text"
            placeholder='Type any description — e.g. "OSKO" or "direct debit" or "overseas"…'
            value="${esc(query)}" oninput="doSearch(this.value)"
            autocomplete="off" spellcheck="false">
          <span class="search-clear${query?' show':''}" onclick="clearSearch()">✕ Clear</span>
        </div>
      </div>
      ${body}
    </div>`;

  // Re-focus search
  const el = document.getElementById('srch');
  if(el){ el.focus(); el.setSelectionRange(query.length, query.length); }
}

function toggle(id){
  openId = (openId === id) ? null : id;
  render();
  if(openId){
    setTimeout(()=>{
      const el = document.getElementById('entry-'+id);
      if(el) el.scrollIntoView({behavior:'smooth',block:'nearest'});
    }, 60);
  }
}

function doSearch(v){ query = v; openId = null; render(); }
function clearSearch(){ query = ''; openId = null; render(); }

function toggleMobileMenu(){
  const sidebar = document.querySelector('.sidebar');
  const btn = document.querySelector('.mobile-menu-btn');
  const isOpen = sidebar.classList.toggle('menu-open');
  if(btn) btn.setAttribute('aria-expanded', String(isOpen));
}
render();
</script>
</body>
</html>
