function stripHtml(h) {

    .replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"').replace(/&#\d+;/g,'')

}

function getSnippets(text, q, maxSnips=3, ctx=95) {
  const lower=text.toLowerCase(), lq=q.toLowerCase(), snips=[];
  let pos=0, lastEnd=-1;
  while(snips.length<maxSnips){
    const idx=lower.indexOf(lq,pos); if(idx===-1) break;
    const s=Math.max(0,idx-ctx), e=Math.min(text.length,idx+lq.length+ctx);
    if(s<lastEnd){pos=idx+lq.length;continue;}
    lastEnd=e;
    const raw=(s>0?'…':'')+text.slice(s,e)+(e<text.length?'…':'');
    const esc=escHtml(raw);
    const hi=esc.replace(new RegExp(escHtml(q).replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'),m=>`<mark>${m}</mark>`);
    snips.push(hi); pos=idx+lq.length;

  return snips;

// ── QUESTION DETECTION ────────────────────────────────────────────────────────
function isQuestion(q) {
  const w = q.trim().split(/\s+/);
  if (q.includes('?')) return true;
  if (w.length >= 5) return true;
  const qw = ['why','how','what','when','can','is','are','does','will','should','would','could','has','have','did','do','if','customer','agent','explain','tell','check'];
  return qw.includes(w[0].toLowerCase());
}

// ── AI CALL ───────────────────────────────────────────────────────────────────
async function callAI(question) {
  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        system: SYS,
        messages:[{role:'user', content: question}]
      })
    });
    const data = await resp.json();
    const raw  = (data.content?.[0]?.text || '').replace(/^```json\s*/,'').replace(/```$/,'').trim();
    S.aiResult = JSON.parse(raw);
    S.aiState  = 'done';
  } catch(e) {
    S.aiState = 'error';
    S.aiError = 'Could not generate an answer right now. Use keyword search or browse the topics below.';
  }
  render();
  const el = document.getElementById('srch');
  if (el) { el.focus(); el.setSelectionRange(S.search.length, S.search.length); }
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
const topic   = id => TOPICS.find(t => t.id === id);
const escHtml = s  => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

// ── RENDER ────────────────────────────────────────────────────────────────────

  document.getElementById('app').innerHTML = `
    <div class="phdr">
      <div class="brand-row">
        <div class="logomark">F</div>
        <div><div class="brand-name">Foundever</div><div class="brand-sub">Westpac Credit Card Guide</div></div>
      </div>
      <a class="hub-link" href="index.html">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
        ID Guide
      </a>
      <a class="hub-link" href="creditcards.html">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
        Training Hub
      </a>
      <a class="hub-link" href="cc-guide.html">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
        CC Statement Guide
      </a>

      
    </div>
    <div class="shell">
      
      ${S.screen === 'home' ? renderHome() : renderTopic()}
    </div>`;
}

function renderHome() {
  const q = S.search.toLowerCase().trim();

  // Determine mode for the hint pill
  const showAI  = q.length > 2 && isQuestion(q);
  const showKW  = q.length > 0 && !showAI;
  const modeTag = showAI
    ? `<span class="mpill mpill-ai">✦ AI Answer</span> Answering: "${escHtml(S.search)}"`
    : showKW
    ? `<span class="mpill mpill-kw">Search</span> Showing results for "${escHtml(S.search)}"`
    : '';

  let html = `
    <div class="home-head">
      <h1>Westpac Credit Card Guide</h1>
      <p>Type a <strong>keyword</strong> to search, or ask a <strong>full question</strong> to get a direct AI answer - e.g. "why is there interest on 2 statements?"</p>
    </div>
    <div class="search-wrap"><input id="srch" class="search" type="text" placeholder='Search or ask - e.g. "refund" or "why is there interest on my statement?"' value="${escHtml(S.search)}" oninput="doSearch(this.value)" autocomplete="off" spellcheck="false"></div>
    ${modeTag ? `<div class="mode-hint">${modeTag}</div>` : ''}`;

  if (!q) {
    // ── BROWSE: categorised grid ──────────────────────────────────────────────
    const cats = [...new Set(TOPICS.map(t => t.cat))];
    for (const cat of cats) {
      html += `<div class="cat-label">${cat}</div><div class="topic-grid" style="border-top:none;padding-top:.3rem">`;
      html += TOPICS.filter(t => t.cat === cat).map(t => `
        <div class="topic-card" onclick="goTopic('${t.id}')">
          <div class="tc-icon" style="background:${t.bg}">${t.icon}</div>
          <div class="tc-lbl">${escHtml(t.label)}</div>
          <div class="tc-desc">${escHtml(t.desc)}</div>
          <div class="tc-clause">${escHtml(t.clause)}</div>
        </div>`).join('');
      html += `</div>`;
    }
    return html;
  }

  // ── AI ANSWER MODE ────────────────────────────────────────────────────────
  if (showAI) {
    html += `<div class="ai-wrap">`;

    if (S.aiState === 'loading') {
      html += `<div class="ai-loading"><div class="ai-spinner"></div> Getting answer from knowledge base…</div>`;

    } else if (S.aiState === 'error') {
      html += `<div class="ai-error">⚠️ ${escHtml(S.aiError)}</div>`;

    } else if (S.aiState === 'done' && S.aiResult) {
      const r = S.aiResult;
      const steps = (r.steps || []).map((s,i) =>
        `<div class="ai-step-row"><div class="ai-num">${i+1}</div><div>${escHtml(s)}</div></div>`).join('');
      html += `
        <div class="ai-card">
          <div class="ai-card-head"><span class="ai-head-lbl">✦ AI Answer - based on Westpac T&Cs & Altitude Terms</span></div>
          <div class="ai-card-body">
            <div class="ai-sec">Direct answer</div>
            <div class="ai-direct">${escHtml(r.direct || '')}</div>
            ${steps ? `<div class="ai-sec">Steps for the agent</div><div class="ai-steps">${steps}</div>` : ''}
            ${r.tell_customer ? `<div class="ai-sec">Suggested wording</div><div class="ai-tell">${escHtml(r.tell_customer)}</div>` : ''}
            <div class="ai-ref">📄 ${escHtml(r.ref || 'Westpac Credit Card T&Cs, 27 June 2024')}</div>
          </div>
        </div>`;
    }

    html += `</div>`;

    // Also show keyword results underneath so the agent can dive deeper
    buildIdx();
    const related = TOPICS.filter(t =>
      S.search.toLowerCase().split(/\s+/).some(w => w.length > 3 && (
        t.label.toLowerCase().includes(w) || t.tags.some(g=>g.includes(w)) || (IDX[t.id] && IDX[t.id].includes(w))
      ))
    ).slice(0, 4);

    if (related.length) {
      html += `<div class="search-count" style="margin-top:.25rem"><strong>Related topics</strong></div>
        <div class="search-results">
          ${related.map(t => `<div class="search-result" onclick="goTopic('${t.id}')">
            <div class="sr-top">
              <div class="sr-icon" style="background:${t.bg}">${t.icon}</div>
              <div class="sr-meta"><div class="sr-label">${escHtml(t.label)}</div><div class="sr-cat">${escHtml(t.cat)} · ${escHtml(t.clause)}</div></div>
              <div class="sr-arrow">→</div>
            </div></div>`).join('')}
        </div>`;
    }
    return html;
  }

  // ── KEYWORD SEARCH MODE ───────────────────────────────────────────────────
  buildIdx();
  const results = TOPICS.map(t => {
    const inLabel = t.label.toLowerCase().includes(q);
    const inDesc  = t.desc.toLowerCase().includes(q);
    const inTags  = t.tags.some(g => g.includes(q));
    const inBody  = IDX[t.id] && IDX[t.id].toLowerCase().includes(q);
    if (!inLabel && !inDesc && !inTags && !inBody) return null;
    const snips = inBody ? getSnippets(IDX[t.id], q) : [];
    const score = (inLabel?4:0)+(inDesc?2:0)+(inTags?1:0)+(inBody?0.5:0);
    return {t, snips, score};
  }).filter(Boolean).sort((a,b) => b.score-a.score);

  if (!results.length) {
    return html + `<div class="no-results">No results for "<strong>${escHtml(S.search)}</strong>" - try a different word, or type a full question for an AI answer.</div>`;
  }

  html += `<div class="search-count"><strong>${results.length}</strong> topic${results.length!==1?'s':''} contain "<strong>${escHtml(S.search)}</strong>"</div>
    <div class="search-results">
      ${results.map(({t,snips}) => `
        <div class="search-result" onclick="goTopic('${t.id}')">
          <div class="sr-top">
            <div class="sr-icon" style="background:${t.bg}">${t.icon}</div>
            <div class="sr-meta"><div class="sr-label">${escHtml(t.label)}</div><div class="sr-cat">${escHtml(t.cat)} · ${escHtml(t.clause)}</div></div>
            <div class="sr-arrow">→</div>
          </div>
          ${snips.length ? `<div class="sr-snippets">${snips.map(s=>`<div class="sr-snippet">${s}</div>`).join('')}</div>` : ''}
        </div>`).join('')}
    </div>`;
  return html;
}

function renderTopic() {
  const t    = topic(S.topicId);
  const body = C[S.topicId] ? C[S.topicId]() : '<div class="content"><p style="color:var(--t3)">Content coming soon.</p></div>';
  const src  = SOURCES[S.topicId] || '';
  return `
    <div class="topic-hdr">
      <div class="th-inner">
        <div class="th-icon" style="background:${t.bg}">${t.icon}</div>
        <div>
          <div class="th-title">${escHtml(t.label)}</div>
          <div class="th-clause">${escHtml(t.clause)} · ${escHtml(t.cat)}</div>
        </div>
      </div>
      <button class="btn" onclick="goHome()" style="flex-shrink:0;align-self:flex-start">← Back</button>
    </div>
    <div class="content">${body}</div>
    ${src ? `<div class="src-bar"><span class="src-icon">📄</span><span><strong>Source:</strong> ${escHtml(src)}</span></div>` : ''}`;
}

function goHome()    { S.screen='home'; render(); window.scrollTo(0,0); }
function goTopic(id) { S.topicId=id; S.screen='topic'; render(); window.scrollTo(0,0); }
function doSearch(v) {
  S.search=v; S.aiResult=null; S.aiError=null;
  const q = v.trim();
  if (q.length > 2 && isQuestion(q) && S.aiState !== 'loading') {
    S.aiState = 'loading';
    render();
    const el=document.getElementById('srch');
    if(el){el.focus();el.setSelectionRange(v.length,v.length);}
    callAI(q);
  } else {
    if (!q) S.aiState='idle';
    render();
    const el=document.getElementById('srch');
    if(el){el.focus();el.setSelectionRange(v.length,v.length);}
  }
}

render();
</script>
